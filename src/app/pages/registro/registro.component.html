<div class="register-container">
  <div class="image-section">
    <img class="player-img" src="assets/images/registro_img.jpg" alt="jugador" />
  </div>

  <div class="form-section">
    <form [formGroup]="registerForm" (ngSubmit)="registrar()" class="form-wrapper">

      <div class="row-group">
        <!-- Nombre -->
        <div class="input-group">
          <label>NOMBRE:</label>
          <input type="text" formControlName="nombre" />
        </div>

        <!-- Apellido 1 -->
        <div class="input-group">
          <label>APELLIDO 1:</label>
          <input type="text" formControlName="ape1" />
        </div>
      </div>

      <div class="row-group">
        <!-- Apellido 2 -->
        <div class="input-group">
          <label>APELLIDO 2 <span class="opcional">(OPCIONAL)</span>:</label>
          <input type="text" formControlName="ape2" />
        </div>

        <!-- Correo -->
        <div class="input-group">
          <label>CORREO:</label>
          <input type="email" formControlName="correo" />
          @if (errorCorreo()) {
            <span class="error-msg">{{ errorCorreo() }}</span>
          }
        </div>
      </div>

      <!-- Contraseña -->
      <div class="input-group">
        <label>CONTRASEÑA:</label>
        <input type="password" formControlName="password" />
      </div>

      <!-- Botones -->
      <div class="button-group">
        <button type="submit" class="btn-gold" [disabled]="registerForm.invalid || cargando">
          @if (cargando) {
            <span class="spinner-pequeno"></span> PROCESANDO...
          } @else {
            REGISTRARME
          }
        </button>

        <button type="button" class="btn-gold" (click)="irALogin()">
          INICIAR SESIÓN
        </button>
      </div>

    </form>
  </div>
</div>
