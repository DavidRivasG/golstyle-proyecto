<div class="register-container">

    <div class="image-section">
        <img class="player-img" src="assets/images/registro_img.jpg" alt="jugador">
    </div>

    <!-- Formulario -->
    <div class="form-section">
        <form [formGroup]="registerForm" (ngSubmit)="registrar()" class="form-wrapper">

            <!-- Nombre -->
            <div class="input-group">
                <label>NOMBRE:</label>
                <input type="text" formControlName="nombre">
            </div>

            <!-- Apellido1 -->
            <div class="input-group">
                <label>APELLIDO 1:</label>
                <input type="text" formControlName="ape1">
            </div>

            <!-- Apellido 2 opcional -->
            <div class="input-group">
                <label>APELLIDO 2 (OPCIONAL):</label>
                <input type="text" formControlName="ape2">
            </div>

            <!-- Correo -->
            <div class="input-group">
                <label>CORREO:</label>
                <input type="email" formControlName="correo">
            </div>

            <!-- Contraseña -->
            <div class="input-group">
                <label>CONTRASEÑA:</label>
                <input type="password" formControlName="password">
            </div>

            <!-- Registro -->
            <div class="button-group">
                <button type="submit" class="btn-gold" [disabled]="registerForm.invalid">
                    REGISTRARSE
                </button>

                <!-- Inicio de sesión -->
                <button type="button" class="btn-gold" (click)="irALogin()">
                    INICIAR SESIÓN
                </button>
            </div>

        </form>
    </div>

</div>
