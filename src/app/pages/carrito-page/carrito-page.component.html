<div id="contenedor-padre">
  <div class="titulo">
    <h1>CARRITO</h1>
  </div>

  <!-- Si el usuario no está logueado -->
  <div *ngIf="!loggedIn" class="loggedIn">
    <p>Para acceder al carrito debes estar una sesion iniciada.</p>
    <div class="enlace">
      <a routerLink="/login" class="btn-gold">Iniciar Sesión</a>
    </div>
  </div>

  <!-- Cargando -->
  <div *ngIf="loading" class="loading">
    <div class="spinner"></div>
    <p>Cargando carrito...</p>
  </div>

  <!-- Carrito vacío -->
  <div *ngIf="!loading && productos.length === 0 && loggedIn" class="carrito-vacio">
    <p>Tu carrito está vacío.</p>
  </div>

  <!-- Mostrar los productos -->
  <div *ngIf="!loading && productos.length > 0 && loggedIn" class="carrito-container">

    <div class="productos">
      <app-carrito-producto *ngFor="let producto of productos" [producto]="producto"
        [procesando]="procesandoId === producto.cod_det_carr" (eliminar)="eliminarProducto($event)"
        (aumentar)="aumentarCantidad($event)" (disminuir)="disminuirCantidad($event)">
      </app-carrito-producto>
    </div>

    <div *ngIf="mensajeCarrito" [class]="'msg-inline msg-' + mensajeCarrito.tipo">
      {{ mensajeCarrito.texto }}
    </div>

    <div class="resumen">
      <h2>Totales del carrito</h2>
      <p><strong>Total:</strong> {{ total | currency:'EUR' }}</p>
      <a class="btn-comprar" routerLink="/checkout">COMPRAR</a>
    </div>

  </div>


</div>
