<div class="titulo">
    <h1>CARRITO</h1>
</div>

<!-- LOADING -->
<div *ngIf="loading" class="loading">
    <div class="spinner"></div>
    <p>Cargando carrito...</p>
</div>

<!-- CARRITO VACÍO -->
<div *ngIf="!loading && productos.length === 0" class="carrito-vacio">
    <p>Tu carrito está vacío.</p>
</div>

<!-- CARRITO CON PRODUCTOS -->
<div *ngIf="!loading && productos.length > 0" class="carrito-container">

    <div class="productos">

        <app-carrito-producto 
            *ngFor="let producto of productos" 
            [producto]="producto"
            (eliminar)="eliminarProducto($event)"
            (aumentar)="aumentarCantidad($event)"
            (disminuir)="disminuirCantidad($event)"
        ></app-carrito-producto>

    </div>

    <div class="resumen">
        <h2>Totales del carrito</h2>

        <p><strong>Total:</strong> {{ total | currency:'EUR' }}</p>

        <button class="btn-comprar">COMPRAR</button>
    </div>

</div>
