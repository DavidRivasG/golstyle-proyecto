<form [formGroup]="form" (ngSubmit)="enviar()" class="form-wrapper">

    <!-- Correo electrónico -->
    <div class="input-group">
        <label>CORREO:</label>
        <input type="email" formControlName="correo">
        <div *ngIf="form.get('correo')?.touched && form.get('correo')?.invalid" class="error">
            Correo inválido
        </div>
    </div>

<!-- Asunto del mensaje -->
    <div class="input-group">
        <label>ASUNTO:</label>
        <select formControlName="asunto">
            <option value="">Selecciona un asunto</option>
            <option value="consulta">Consulta</option>
            <option value="soporte">Soporte</option>
            <option value="comentarios">Comentarios</option>
            <option value="localizar-pedido">Localizar mi pedido</option>
            <option value="otros">Otros</option>
        </select>
        <div *ngIf="form.get('asunto')?.touched && form.get('asunto')?.invalid" class="error">
            Selecciona un asunto
        </div>
    </div>

    <!-- ID del pedido (solo si es asunto = Localizar mi pedido) -->
    <div class="input-group" *ngIf="form.get('asunto')?.value === 'localizar-pedido'">
        <label>ID DEL PEDIDO:</label>
        <input type="text" formControlName="idPedido">
        <div *ngIf="form.get('idPedido')?.touched && form.get('idPedido')?.invalid" class="error">
            ID del pedido requerido
        </div>
    </div>

    <!-- Mensaje de contexto -->
    <div class="input-group">
        <label>MENSAJE:</label>
        <textarea rows="5" formControlName="mensaje"></textarea>
        <div *ngIf="form.get('mensaje')?.touched && form.get('mensaje')?.invalid" class="error">
            Mensaje requerido
        </div>
    </div>

    <!-- Botón para enviar -->
    <div class="button-group">
        <button type="submit" class="btn-gold" [disabled]="form.invalid || cargando" [ngClass]="estadoEnvio">
            @if (cargando) {
                <span class="spinner-pequeno"></span> PROCESANDO...
            } @else if (estadoEnvio === 'error') {
                <span class="mensaje-alerta">Error al enviar. Inténtalo de nuevo.</span>
            } @else {
                ENVIAR
            }
        </button>
    </div>
</form>

<!-- Overlay éxito contacto -->
@if (exitoContacto()) {
  <div class="success-overlay">
    <div class="tarjeta-modal">
      <h1 class="titulo-dorado">{{ exitoContacto()!.titulo }}</h1>
      <div class="divisor-dorado"></div>
      <div class="icono-check">
        <svg width="70" height="70" viewBox="0 0 24 24" fill="none" stroke="#d4af37" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
          <polyline points="22 4 12 14.01 9 11.01"></polyline>
        </svg>
      </div>
      <p class="mensaje-exito">{{ exitoContacto()!.subtitulo }}</p>
      <div class="acciones">
        <button class="btn-gold" (click)="exitoContacto.set(null)">Cerrar</button>
      </div>
    </div>
  </div>
}
