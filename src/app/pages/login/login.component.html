<div class="login-container">
  <div class="image-section">
    <img src="assets/images/jugador.png" alt="Jugador" class="player-img">
  </div>

  <div class="form-section">
    <form [formGroup]="loginForm" (ngSubmit)="iniciarSesion()" class="form-wrapper">

      <div class="input-group">
        <label>CORREO:</label>
        <input type="email" formControlName="correo">
        <div *ngIf="loginForm.get('correo')?.invalid && loginForm.get('correo')?.touched" class="error">
          Email inválido
        </div>
      </div>

      <div class="input-group">
        <label>CONTRASEÑA:</label>
        <input type="password" formControlName="password">
        <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="error">
          Contraseña requerida
        </div>
      </div>

      <div class="button-group">
        <button type="submit" class="btn-gold" [disabled]="loginForm.invalid">
          INICIAR SESIÓN
        </button>

        <button type="button" class="btn-gold" (click)="irARegistro()">
          CREAR CUENTA
        </button>
      </div>

    </form>
  </div>
</div>
