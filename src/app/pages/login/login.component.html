<div class="login-container">
  <div class="image-section">
    <img src="assets/images/jugador.png" alt="Jugador" class="player-img" />
  </div>

  <div class="form-section">
    <form
      [formGroup]="loginForm"
      (ngSubmit)="iniciarSesion()"
      class="form-wrapper"
    >
      <!-- Correo -->
      <div class="input-group">
        <label>CORREO:</label>
        <input type="email" formControlName="correo" />
        <div
          *ngIf="
            loginForm.get('correo')?.invalid && loginForm.get('correo')?.touched
          "
          class="error"
        >
          Email inválido
        </div>
      </div>

      <!-- Contraseña -->
      <div class="input-group">
        <label>CONTRASEÑA:</label>
        <input type="password" formControlName="password" />
        <div
          *ngIf="
            loginForm.get('password')?.invalid &&
            loginForm.get('password')?.touched
          "
          class="error"
        >
          Contraseña requerida
        </div>
      </div>

      <!-- Error de login -->
      <div *ngIf="errorLogin" class="msg-inline msg-error">
        {{ errorLogin }}
      </div>

      <!-- Iniciar sesión -->
      <div class="button-group">
        <button type="submit" class="btn-gold" [disabled]="loginForm.invalid || cargando">
          @if (cargando) {
            <span class="spinner-pequeno"></span> PROCESANDO...
          } @else {
            INICIAR SESION
          }
        </button>

        <div id="googleButtonContainer">
          <asl-google-signin-button
            type="standard"
            size="large"
            theme="filled_black"
            width="320"
          ></asl-google-signin-button>
        </div>
        <!-- Ir al registro -->
        <button type="button" class="btn-gold" (click)="irARegistro()">
          CREAR CUENTA
        </button>
      </div>
    </form>
  </div>
</div>
