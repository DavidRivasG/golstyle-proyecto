<div class="detalles-pedido-container">
  <h1 class="titulo-detalles">Detalles del Pedido #{{ pedido?.cod_ped }}</h1>

  <!-- Cargando la página -->
  <div *ngIf="loading" class="loading-message">
    <p>Cargando detalles del pedido...</p>
  </div>

  <!-- Mostrar error -->
  <div *ngIf="error" class="error-message">
    <p>{{ error }}</p>
  </div>

  <!-- Comunicación con el componente hijo -->
  <app-detalle-pedido-view *ngIf="!loading && !error && pedido" [pedido]="pedido" (cancelar)="onCancelarPedido($event)"></app-detalle-pedido-view>
</div>
