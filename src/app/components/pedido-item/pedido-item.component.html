<div class="tarjeta-pedido" [ngClass]="'borde-' + pedido.estado">
  <div class="pedido-info">
    <div class="pedido-encabezado">
      <span class="numero-pedido">#{{ pedido.cod_ped }}</span>
      <span class="badge-estado" [ngClass]="'badge-' + pedido.estado">
        {{ pedido.estado | titlecase }}
      </span>
    </div>
    <div class="pedido-meta">
      <span class="meta-item">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="16" y1="2" x2="16" y2="6"></line>
          <line x1="8" y1="2" x2="8" y2="6"></line>
          <line x1="3" y1="10" x2="21" y2="10"></line>
        </svg>
        {{ pedido.fecha | date:'dd MMM yyyy' }}
      </span>
    </div>
  </div>

  <div class="pedido-divider"></div>

  <div class="pedido-total-acciones">
    <div class="total">
      <span class="total-label">Total</span>
      <span class="total-valor">{{ pedido.total | number:'1.2-2' }}€</span>
    </div>
    <div class="acciones">
      <a [routerLink]="['/detalles-pedido', pedido.cod_ped]" class="btn-detalles">
        Ver detalles
      </a>
      <button
        *ngIf="pedido.estado === 'pendiente' || pedido.estado === 'pagado'"
        (click)="onCancelar()"
        class="btn-cancelar"
        [disabled]="cancelando">
        Cancelar
      </button>
    </div>
  </div>
</div>
