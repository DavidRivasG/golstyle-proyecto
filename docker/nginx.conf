# BLOQUE DE REDIRECCIÓN (HTTP -> HTTPS)
server {
    listen 80;
    listen [::]:80;
    server_name golstyle.ddns.net www.golstyle.ddns.net;
    
    # Redirigir todo el tráfico a HTTPS
    return 301 https://$host$request_uri;
}

# BLOQUE HTTPS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name golstyle.ddns.net www.golstyle.ddns.net;

    root /usr/share/nginx/html;
    index index.html;

    resolver 127.0.0.11 valid=30s;

    # Certificados SSL
    ssl_certificate     /etc/letsencrypt/live/golstyle.ddns.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/golstyle.ddns.net/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Angular SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy REST API
    location /api/ {
        set $backend http://api.golstyle.internal:8000;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }

    # Sanctum
    location /sanctum/ {
        set $backend http://api.golstyle.internal:8000;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Laravel Blade Admin
    location /admin/ {
        set $backend http://api.golstyle.internal:8000;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }
}
